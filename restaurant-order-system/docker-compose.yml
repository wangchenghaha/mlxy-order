services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurant_order
      MYSQL_USER: restaurant
      MYSQL_PASSWORD: restaurant
      TZ: Asia/Kuala_Lumpur
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  mysql-data:
